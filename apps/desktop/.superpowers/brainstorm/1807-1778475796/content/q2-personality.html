<h2>C 方向 — 性格定位</h2>
<p class="subtitle">"现代 AI 工作台"是一个大方向，具体性格不同，视觉差别很大</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>专业克制</h3>
      <p>像 Linear / Notion 那样：灰白色调为主，极少量强调色，信息密度适中，大量留白。适合"这是我的主力生产力工具"。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>暗色沉浸</h3>
      <p>像 Claude.ai / Arc Browser：深色底 + 柔和发光效果 + 磨砂玻璃材质。适合长时间盯着屏幕的编码场景。打字体验像在"星舰驾驶舱"。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>轻量活泼</h3>
      <p>像 Raycast / Warp 终端：大量圆角、bright accent、动态微交互。适合"这个工具用起来有愉悦感"。对配色要求更高。</p>
    </div>
  </div>
</div>
