name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/desktop-release.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "release/**"
      - "docs/release/**"
      - "docs/superpowers/specs/2026-07-10-public-beta-convergence-design.md"
      - "docs/superpowers/plans/2026-07-10-main-integration-release-truth.md"
      - "apps/desktop/**"
      - "apps/desktop/package-lock.json"
      - "apps/desktop/src-tauri/Cargo.lock"
      - "apps/eval-runner/**"
      - "apps/eval-runner/uv.lock"
      - "apps/website/**"
      - "apps/website/package-lock.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".github/workflows/desktop-release.yml"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - "release/**"
      - "docs/release/**"
      - "docs/superpowers/specs/2026-07-10-public-beta-convergence-design.md"
      - "docs/superpowers/plans/2026-07-10-main-integration-release-truth.md"
      - "apps/desktop/**"
      - "apps/desktop/package-lock.json"
      - "apps/desktop/src-tauri/Cargo.lock"
      - "apps/eval-runner/**"
      - "apps/eval-runner/uv.lock"
      - "apps/website/**"
      - "apps/website/package-lock.json"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional desktop-vX.Y.Z-beta.N tag for an R3 candidate on main"
        required: false
        type: string
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-contract:
    name: Workflow contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check:ci

  release-contract:
    name: Release contract
    runs-on: ubuntu-latest
    needs: workflow-contract
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - name: Validate release contracts
        run: >-
          node --test
          scripts/release-baseline.test.mjs
          scripts/acceptance.test.mjs
          scripts/release-confidence-summary.test.mjs
          scripts/validate-release-gate-profile.test.mjs
          scripts/validate-release-manifest.test.mjs
          scripts/build-release-candidate.test.mjs
          scripts/build-representative-evidence.test.mjs
      - name: Emit release-contract evidence
        run: |
          mkdir -p artifacts/release-contract
          node scripts/validate-release-gate-profile.mjs \
            --release-profile release/release-gates.v1.json \
            --require-state R3 > artifacts/release-contract/profile-validation.json
          scripts/acceptance.sh \
            --list-json \
            --release-profile release/release-gates.v1.json \
            --require-state R3 > artifacts/release-contract/r3-selected-gates.json
          scripts/acceptance.sh \
            --only "release manifest contract validation" \
            --results-json artifacts/release-contract/release-contract-gate-results.json
      - uses: actions/upload-artifact@v4
        with:
          name: forge-release-contract-${{ github.sha }}
          path: |
            artifacts/release-contract/**
            release/release-gates.v1.json
            release/release-gate-profile.schema.json
            release/release-manifest.schema.json
            release/evidence/merge-train/desktop-safety.json
            release/evidence/merge-train/eval-trustworthiness.json
          if-no-files-found: error

  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run check:frontend-architecture
      - run: npm run build

  desktop-backend:
    name: Desktop backend
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: npm ci
      - run: npm run build
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: npm run check:protocol

  eval-runner:
    name: Eval runner
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/eval-runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest -q
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app

  website:
    name: Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/website/package-lock.json
      - run: npm ci
      - run: npm run build

  nightly-eval:
    name: Nightly eval
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    needs:
      - desktop-frontend
      - eval-runner
      - release-contract
    env:
      RELEASE_INPUT_DIR: ${{ github.workspace }}/.forge-release-inputs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
      - run: npm --prefix apps/desktop ci
      - run: cd apps/eval-runner && uv sync --frozen --dev
      - run: |
          mkdir -p "$RELEASE_INPUT_DIR"
          cp release/evidence/merge-train/eval-trustworthiness.json "$RELEASE_INPUT_DIR/eval-trustworthiness.json"
      - name: Eval unit tests
        run: npm --prefix apps/desktop run eval:forge:test
      - name: Representative Forge mock
        run: |
          npm run eval:forge:mock -- --output "$RELEASE_INPUT_DIR/mock-backtest.json"
          node scripts/build-representative-evidence.mjs \
            --input "$RELEASE_INPUT_DIR/mock-backtest.json" \
            --output "$RELEASE_INPUT_DIR/representative-mock.json" \
            --evidence-type representative_mock \
            --commit "$GITHUB_SHA"
      - name: Continuity dry-run
        run: npm run eval:continuity -- --dry-run
      - name: Eval R2 gate results
        run: >-
          scripts/acceptance.sh
          --release-profile release/release-gates.v1.json
          --require-state R2
          --results-json "$RELEASE_INPUT_DIR/eval-gate-results.json"
      - name: Representative real Forge (API key required)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$ANTHROPIC_API_KEY" || { echo "ANTHROPIC_API_KEY is required for trusted real-Forge evidence" >&2; exit 1; }
          npm run eval:forge:smoke:real -- \
            --output "$RELEASE_INPUT_DIR/real-forge-backtest.json" \
            --timeout 120 \
            --max-model-rounds 20
          node scripts/build-representative-evidence.mjs \
            --input "$RELEASE_INPUT_DIR/real-forge-backtest.json" \
            --output "$RELEASE_INPUT_DIR/representative-real-forge.json" \
            --evidence-type representative_real_forge \
            --commit "$GITHUB_SHA"
      - name: Verify candidate Eval inputs
        run: |
          test -s "$RELEASE_INPUT_DIR/eval-gate-results.json"
          test -s "$RELEASE_INPUT_DIR/mock-backtest.json"
          test -s "$RELEASE_INPUT_DIR/representative-mock.json"
          test -s "$RELEASE_INPUT_DIR/real-forge-backtest.json"
          test -s "$RELEASE_INPUT_DIR/representative-real-forge.json"
          test -s "$RELEASE_INPUT_DIR/eval-trustworthiness.json"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: forge-eval-inputs-${{ github.sha }}
          path: |
            ${{ env.RELEASE_INPUT_DIR }}/eval-gate-results.json
            ${{ env.RELEASE_INPUT_DIR }}/mock-backtest.json
            ${{ env.RELEASE_INPUT_DIR }}/representative-mock.json
            ${{ env.RELEASE_INPUT_DIR }}/real-forge-backtest.json
            ${{ env.RELEASE_INPUT_DIR }}/representative-real-forge.json
            ${{ env.RELEASE_INPUT_DIR }}/eval-trustworthiness.json
          if-no-files-found: error

  release-candidate:
    name: Release candidate
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && inputs.release_tag != '' && github.ref == 'refs/heads/main'
    needs:
      - release-contract
      - desktop-backend
      - website
      - nightly-eval
    env:
      RELEASE_INPUT_DIR: ${{ github.workspace }}/.forge-release-inputs
      GITNEXUS_EVIDENCE: ${{ github.workspace }}/.forge-release-inputs/gitnexus.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git switch -C main "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/website/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: npm --prefix apps/desktop ci
      - run: npm --prefix apps/website ci
      - run: cd apps/eval-runner && uv sync --frozen --dev
      - uses: actions/download-artifact@v4
        with:
          name: forge-eval-inputs-${{ github.sha }}
          path: ${{ env.RELEASE_INPUT_DIR }}
      - name: Run exact R3 profile
        run: >-
          scripts/acceptance.sh --release-profile release/release-gates.v1.json --require-state R3
          --results-json "$RUNNER_TEMP/forge-r3-gates.json"
      - name: Record CI GitNexus fallback boundary
        run: |
          node -e '
            const fs = require("node:fs");
            const evidence = {
              schema_version: 1,
              mode: "fallback",
              current_commit: process.env.GITHUB_SHA,
              indexed_commit: process.env.GITHUB_SHA,
              impact_risk: "HIGH",
              refresh_error: "GitNexus MCP is unavailable in GitHub Actions; local indexed evidence remains required for promotion",
              residual_risks: ["CI candidate retains HIGH GitNexus fallback risk until local indexed evidence is attached"]
            };
            fs.writeFileSync(process.env.GITNEXUS_EVIDENCE, JSON.stringify(evidence, null, 2) + "\n");
          '
      - name: Build immutable R3 candidate
        run: |
          npm run release:candidate -- \
            --tag "${{ inputs.release_tag }}" \
            --release-profile release/release-gates.v1.json \
            --require-state R3 \
            --acceptance-json "$RUNNER_TEMP/forge-r3-gates.json" \
            --desktop-safety-evidence release/evidence/merge-train/desktop-safety.json \
            --eval-trust-evidence release/evidence/merge-train/eval-trustworthiness.json \
            --gitnexus-evidence "$GITNEXUS_EVIDENCE" \
            --mock-evidence "$RELEASE_INPUT_DIR/representative-mock.json" \
            --real-forge-evidence "$RELEASE_INPUT_DIR/representative-real-forge.json"
      - uses: actions/upload-artifact@v4
        with:
          name: forge-r3-${{ github.sha }}
          path: release/evidence/${{ inputs.release_tag }}/candidate-manifest.json
          if-no-files-found: error
