version: 2

updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/desktop"
      - "/apps/desktop/cli"
      - "/apps/website"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 0
    groups:
      npm-security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 0
    groups:
      cargo-security:
        applies-to: "security-updates"
        patterns:
          - "*"
